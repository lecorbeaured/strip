name: PR Preview & Smoke Test

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Serve dist
        run: npx http-server dist -p 8080 &
      - name: Wait for server
        run: |
          for i in {1..10}; do
            npx wait-on http://127.0.0.1:8080 && break || sleep 1
          done
      - name: Smoke test /blog
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/blog)
          echo "Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Smoke test failed: /blog returned $HTTP_STATUS"
            exit 1
          fi
